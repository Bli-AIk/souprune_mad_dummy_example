name = "example_mod"
version = "0.1.0"
authors = ["Your Name"]
description = "An example mod for SoupRune."

# Resource directories configuration
# 资源目录配置
[resources]
textures = "assets/textures"      # Texture/sprite resources / 图片资源目录
audios = "assets/audios"          # Audio resources / 音频资源目录
fonts = "assets/fonts"            # Font resources / 字体资源目录

[dependencies]
undertale_preset = "0.1.0"

[mod_library]
# WASM component file, loaded by wasmtime at runtime
# WASM 组件文件，运行时由 wasmtime 加载
wasm = ".build/runtime.wasm"

[content_library]
wasm = ".build/content.wasm"
managed_paths = [
    "actors/enemies/mad_dummy.enemy.ron",
    "battle/chapters/demo.sequence.ron",
    "battle/chapters/demo_turn_narration.sequence.ron",
    "battle/danmaku/cotton_bottom_wave.performance.ron",
    "battle/danmaku/cotton_first_turn.performance.ron",
    "battle/danmaku/cotton_side_pincer.performance.ron",
    "battle/danmaku/cotton_surround.performance.ron",
    "battle/danmaku/cotton_top_sweep.performance.ron",
    "battle/danmaku/demo_attack.performance.ron",
    "battle/rules/dialogue_test.fre.ron",
    "battle/turns/cotton_bottom_wave.sequence.ron",
    "battle/turns/cotton_first_turn.sequence.ron",
    "battle/turns/cotton_side_pincer.sequence.ron",
    "battle/turns/cotton_surround.sequence.ron",
    "battle/turns/cotton_top_sweep.sequence.ron",
    "battle/view/battle_bg.view.ron",
    "battle/view/mad_dummy.view.ron",
    "overworld/characters/frisk.character.ron",
    "overworld/characters/frisk/animations.animation_config.ron",
    "overworld/chase_config.ron",
    "overworld/danmaku/demo_attack_ow.performance.ron",
    "overworld/entry.sequence.ron",
    "overworld/rules/demo.fre.ron",
]

[game]
initial_sequence_path = "overworld/entry.sequence.ron"
initial_battle_path = "battle/chapters/demo.sequence.ron"
chase_config = "overworld/chase_config.ron"
enemy_directory = "actors/enemies"
locales_directory = "assets/locales"
# rng_seed = 42  # Optional: fixed seed for deterministic random behavior (testing/replay)
# battle_camera_zoom = 2.0  # Camera zoom when entering battle (default: 2.0)
