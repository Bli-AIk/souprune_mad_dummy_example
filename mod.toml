name = "mad_dummy_example"
version = "0.1.0"
authors = ["SoupRune Contributors"]
description = "Mad Dummy example project for SoupRune."

# Resource directories configuration
# 资源目录配置
[resources]
textures = "assets/textures"      # Texture/sprite resources / 图片资源目录
audios = "assets/audios"          # Audio resources / 音频资源目录
fonts = "assets/fonts"            # Font resources / 字体资源目录

[dependencies]
undertale_preset = "0.1.0"

[mod_library]
# WASM component file, loaded by wasmtime at runtime
# WASM 组件文件，运行时由 wasmtime 加载
wasm = ".build/runtime.wasm"

[content_library]
wasm = ".build/content.wasm"

[game]
initial_mode = "overworld"
chase_config = "overworld/chase_config.ron"
enemy_directory = "actors/enemies"
locales_directory = "assets/locales"
# rng_seed = 42  # Optional: fixed seed for deterministic random behavior (testing/replay)

[game.modes.overworld]
primitives = [
    "top_down_map",
    "top_down_player",
    "interaction_zones",
    "view_runtime",
    "fre_rules",
    "sequencer",
    "danmaku",
    "chase",
]
entry_sequence = "overworld/entry.sequence.ron"

[game.modes.battle]
primitives = [
    "fixed_scene",
    "view_runtime",
    "fre_rules",
    "sequencer",
    "danmaku",
    "alight_motion",
    "speech_bubble",
    "battle_menu_state",
]
entry_sequence = "battle/chapters/demo.sequence.ron"
fixed_camera_zoom = 2.0
