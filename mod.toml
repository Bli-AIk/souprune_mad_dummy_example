name = "example_mod"
version = "0.1.0"
authors = ["Your Name"]
description = "An example mod for SoupRune."

# Resource directories configuration
# 资源目录配置
[resources]
textures = "assets/textures"      # Texture/sprite resources / 图片资源目录
audios = "assets/audios"          # Audio resources / 音频资源目录

[dependencies]
# List dependencies here

[soul_modes]
# These IDs are now all provided by the same DLL below
"soul_red" = "libmod_example.so"
"soul_blue" = "libmod_example.so"

[game]
global_rules = "global.fre.ron"
initial_map_path = "states/overworld/levels/ruins/ruins_3.tmx"
initial_battle_path = "states/battle/chapters/demo.sequence.ron"
player_behavior_path = "states/overworld/players/player_behavior.ron"
input_config_path = "config/input.ron"
states_config = "config/states.ron"
# Chase state configuration (optional - omit to disable chase functionality)
chase_config = "states/overworld/chase_config.ron"
