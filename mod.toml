name = "example_mod"
version = "0.1.0"
authors = ["Your Name"]
description = "An example mod for SoupRune."

# Resource directories configuration
# 资源目录配置
[resources]
textures = "assets/textures"      # Texture/sprite resources / 图片资源目录
audios = "assets/audios"          # Audio resources / 音频资源目录
fonts = "assets/fonts"            # Font resources / 字体资源目录

[dependencies]
undertale_preset = "0.1.0"

[mod_library]
# WASM component file, loaded by wasmtime at runtime
# WASM 组件文件，运行时由 wasmtime 加载
wasm = "mod_example.wasm"

[game]
initial_sequence_path = "states/overworld/entry.sequence.ron"
initial_battle_path = "states/battle/chapters/demo.sequence.ron"
chase_config = "states/overworld/chase_config.ron"
